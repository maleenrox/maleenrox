name: Generate Terminal Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics-overview.svg
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-overview.svg
          token: ${{ secrets.METRICS_TOKEN }}

          template: terminal
          base: header, activity, community, repositories

          config_timezone: Asia/Colombo
          config_order: base.header, base.activity, base.community, base.repositories

          # HTML-targeted CSS to override the Ubuntu theme with a Cyberpunk/Kali aesthetic
          config_custom_css: |
            /* Set the main terminal background to deep black */
            .terminal { background-color: #050505 !important; border: 1px solid #00e5ff !important; }
            
            /* Set the top header bar to a flat dark grey */
            .terminal-header { background-color: #111111 !important; border-bottom: 1px solid #00e5ff !important; }
            
            /* Make all standard output text neon cyan with a slight glow */
            .terminal-body, .terminal-body * { 
              color: #00e5ff !important; 
              text-shadow: 0 0 3px rgba(0, 229, 255, 0.4) !important;
              font-family: 'JetBrains Mono', 'Courier New', monospace !important; 
            }
            
            /* Keep the executed commands white for sharp contrast */
            .token_1 { color: #ffffff !important; text-shadow: none !important; }
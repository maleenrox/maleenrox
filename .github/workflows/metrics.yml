name: Generate Terminal Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics-overview.svg
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-overview.svg
          token: ${{ secrets.METRICS_TOKEN }}

          template: terminal
          base: header, activity, community, repositories

          config_timezone: Asia/Colombo
          config_order: base.header, base.activity, base.community, base.repositories

          # Custom CSS to force the Kali Linux / Cyberpunk aesthetic
          config_custom_css: |
            /* Set the main terminal background to deep black */
            rect { fill: #050505 !important; } 
            
            /* Set the top header bar to a slightly lighter grey/black */
            rect[height="26"] { fill: #111111 !important; } 
            
            /* Make all standard text neon cyan with a slight glow */
            text, tspan { 
              fill: #00e5ff !important; 
              text-shadow: 0 0 3px rgba(0, 229, 255, 0.4) !important;
              font-family: 'JetBrains Mono', 'Courier New', monospace !important; 
            }
            
            /* Highlight specific terminal outputs or commands in white for contrast */
            .field, .value { fill: #ffffff !important; text-shadow: none !important; }
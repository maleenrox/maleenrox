name: Generate Terminal Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics-overview.svg
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: header, activity, community, repositories
          config_timezone: Asia/Colombo
          config_order: base.header, base.activity, base.community, base.repositories

          # Kali Linux Terminal Mode & Cyan Aesthetics via SVG Fill Overrides
          config_custom_css: |
            /* 1. Override the default Ubuntu purple backgrounds to Kali Dark */
            [fill="#300a24"], [fill="#2c001e"] { 
              fill: #0a0a0c !important; /* Deep dark almost-black background */
            }
            
            /* 2. Override the terminal header bar to Kali Dark Grey */
            [fill="#434343"], [fill="#3e3e3e"] { 
              fill: #1a1b26 !important; /* Kali modern terminal title bar */
            }
            
            /* 3. Convert all default text elements to bright Cyan */
            text, [fill="#4e9a06"], [fill="#8ae234"], [fill="#ffffff"], [fill="#d3d7cf"], [fill="#729fcf"] {
              fill: #00ffff !important;
              color: #00ffff !important;
              text-shadow: 0 0 2px rgba(0, 255, 255, 0.4) !important;
              font-family: 'Hack', 'Fira Code', 'Consolas', monospace !important;
            }
            
            /* 4. Create slight contrast for standard user/hostname prompts */
            [fill="#8ae234"] {
              fill: #00cccc !important; /* Slightly darker cyan for dimension/depth */
            }
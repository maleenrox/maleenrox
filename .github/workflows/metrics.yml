name: Generate Terminal Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate metrics-overview.svg
        uses: lowlighter/metrics@latest
        with:
          filename: metrics-overview.svg
          token: ${{ secrets.METRICS_TOKEN }}
          template: terminal
          base: header, activity, community, repositories
          config_timezone: Asia/Colombo
          config_order: base.header, base.activity, base.community, base.repositories

          # Force Cyberpunk Dark Mode & Cyan Aesthetics via SVG Fill Overrides
          config_custom_css: |
            /* 1. Override the default Ubuntu purple backgrounds to deep black */
            [fill="#300a24"], [fill="#2c001e"] { 
              fill: #050505 !important; 
            }
            
            /* 2. Override the terminal header bar to dark grey */
            [fill="#434343"], [fill="#3e3e3e"] { 
              fill: #111111 !important; 
            }
            
            /* 3. Convert default green/white/grey text elements to glowing cyan */
            text, [fill="#4e9a06"], [fill="#8ae234"], [fill="#ffffff"], [fill="#d3d7cf"] {
              fill: #00e5ff !important;
              color: #00e5ff !important;
              text-shadow: 0 0 3px rgba(0, 229, 255, 0.4) !important;
              font-family: 'JetBrains Mono', 'Courier New', monospace !important;
            }
            
            /* 4. Keep specific command text or blue variables white for sharp contrast */
            [fill="#729fcf"] {
              fill: #ffffff !important;
              text-shadow: none !important;
            }